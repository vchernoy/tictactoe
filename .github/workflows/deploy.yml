name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Publish built dist/ to gh-pages; Pages must serve that branch (see README).
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: true
          single-commit: true

      - name: Verify live site serves production build
        run: |
          for url in \
            "https://vchernoy.github.io/tictactoe/" \
            "https://vchernoy.xyz/tictactoe/"; do
            html=$(curl -fsSL --max-time 30 "$url")
            if echo "$html" | grep -q '/src/main.tsx'; then
              echo "::error::${url} still serves unbuilt source index.html."
              echo "In github.com/vchernoy/tictactoe → Settings → Pages, set Source to Deploy from branch → gh-pages → / (root), then re-run this workflow."
              exit 1
            fi
            if ! echo "$html" | grep -q '/tictactoe/assets/index-'; then
              echo "::error::${url} does not reference built /tictactoe/assets/index-*.js."
              exit 1
            fi
            echo "OK: $url serves production index.html"
          done
