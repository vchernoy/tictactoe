name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Publish built dist/ to gh-pages; Pages must serve that branch (see README).
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: true
          single-commit: true

      - name: Verify gh-pages artifact
        run: |
          html=$(curl -fsSL "https://raw.githubusercontent.com/vchernoy/tictactoe/gh-pages/index.html")
          echo "$html" | grep -q '/tictactoe/assets/index-' || (echo 'gh-pages index.html missing built assets' && exit 1)
          echo "$html" | grep -q '/src/main.tsx' && (echo 'gh-pages still has dev index.html' && exit 1)
          echo "OK: gh-pages branch contains production build"

      - name: Check live URLs (informational)
        continue-on-error: true
        run: |
          for url in \
            "https://vchernoy.github.io/tictactoe/" \
            "https://vchernoy.xyz/tictactoe/"; do
            html=$(curl -fsSL --max-time 30 "$url" || true)
            if echo "$html" | grep -q '/src/main.tsx'; then
              echo "::warning::${url} still serves main-branch source. Set Pages source to gh-pages (see README)."
            elif echo "$html" | grep -q '/tictactoe/assets/index-'; then
              echo "OK: $url serves production build"
            else
              echo "::warning::${url} returned unexpected HTML"
            fi
          done
