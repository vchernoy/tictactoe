name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Verify live site serves production build
        run: |
          sleep 15
          for url in \
            "https://vchernoy.github.io/tictactoe/" \
            "https://vchernoy.xyz/tictactoe/"; do
            html=$(curl -fsSL --max-time 30 "$url")
            if echo "$html" | grep -q '/src/main.tsx'; then
              echo "::error::${url} still serves unbuilt source index.html."
              echo "Pages is likely still deploying from the main branch (pages-build-deployment)."
              echo "In Settings → Pages → Build and deployment → Source, choose GitHub Actions, then re-run this workflow."
              exit 1
            fi
            if ! echo "$html" | grep -q '/tictactoe/assets/index-'; then
              echo "::error::${url} does not reference built /tictactoe/assets/index-*.js."
              exit 1
            fi
            echo "OK: $url serves production index.html"
          done
